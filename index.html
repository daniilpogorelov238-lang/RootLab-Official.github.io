<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>RootLab Official | Загрузка плагинов и контента</title>
    <!-- Font Awesome Icons (v6 free) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts: Inter + Space Grotesk -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0c12;
            font-family: 'Inter', sans-serif;
            color: #eef2ff;
            line-height: 1.5;
            scroll-behavior: smooth;
        }

        /* glass + neon theme */
        :root {
            --glow-cyan: #00f2ff;
            --glow-purple: #b624ff;
            --bg-dark: #0a0c12;
            --card-bg: rgba(18, 22, 35, 0.75);
            --border-neon: rgba(0, 242, 255, 0.25);
            --accent: #00e0ff;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #141a2a;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--glow-cyan);
            border-radius: 8px;
        }

        .app-container {
            max-width: 1440px;
            margin: 0 auto;
            padding: 1.5rem 2rem;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(0, 242, 255, 0.3);
        }
        .logo h1 {
            font-family: 'Space Grotesk', monospace;
            font-size: 1.9rem;
            background: linear-gradient(135deg, #fff, var(--glow-cyan), var(--glow-purple));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }
        .logo span {
            font-size: 0.8rem;
            color: #7e8a9c;
            display: block;
        }
        .new-post-btn {
            background: linear-gradient(95deg, #00c3ff20, #9d4eff20);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-neon);
            padding: 0.7rem 1.5rem;
            border-radius: 60px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .new-post-btn:hover {
            border-color: var(--glow-cyan);
            box-shadow: 0 0 12px rgba(0, 242, 255, 0.3);
            transform: scale(1.02);
        }

        .tabs-filter {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
            border-bottom: 1px solid #1f2538;
            padding-bottom: 0.75rem;
        }
        .tab-btn {
            background: transparent;
            border: none;
            color: #9aa4bf;
            font-size: 1rem;
            font-weight: 600;
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .tab-btn i {
            font-size: 1.1rem;
        }
        .tab-btn.active {
            background: rgba(0, 242, 255, 0.15);
            color: var(--glow-cyan);
            box-shadow: 0 0 6px rgba(0,242,255,0.2);
            border: 1px solid rgba(0,242,255,0.4);
        }
        .tab-btn:hover:not(.active) {
            color: white;
            background: #1e253e;
        }

        .feed-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(330px, 1fr));
            gap: 1.8rem;
            margin-top: 1rem;
        }
        .post-card {
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            border-radius: 28px;
            border: 1px solid rgba(0, 242, 255, 0.2);
            overflow: hidden;
            transition: all 0.25s ease;
            box-shadow: 0 12px 28px -8px rgba(0,0,0,0.5);
        }
        .post-card:hover {
            border-color: var(--glow-cyan);
            transform: translateY(-5px);
            box-shadow: 0 20px 32px -12px rgba(0,242,255,0.2);
        }
        .card-media {
            width: 100%;
            max-height: 220px;
            object-fit: cover;
            background: #10141f;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .img-placeholder, .video-placeholder, .plugin-placeholder {
            width: 100%;
            height: 180px;
            background: #11161f;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: var(--glow-cyan);
            flex-direction: column;
            gap: 6px;
        }
        img.card-img, video.card-video {
            width: 100%;
            display: block;
            max-height: 220px;
            object-fit: cover;
        }
        .card-content {
            padding: 1.2rem 1.2rem 1.4rem;
        }
        .badge-type {
            display: inline-block;
            font-size: 0.7rem;
            text-transform: uppercase;
            background: #1f2a44;
            padding: 0.2rem 0.7rem;
            border-radius: 30px;
            margin-bottom: 0.7rem;
            letter-spacing: 1px;
            color: #a7c0ff;
        }
        .post-title {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #fff, #b0e0ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .post-desc {
            color: #b9c3de;
            margin: 0.6rem 0;
            font-size: 0.9rem;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .plugin-details {
            background: #00000030;
            border-radius: 20px;
            padding: 0.5rem 0.8rem;
            font-size: 0.8rem;
            margin: 0.7rem 0;
            font-family: monospace;
            border-left: 3px solid var(--glow-cyan);
            word-break: break-all;
        }
        .card-actions {
            margin-top: 1rem;
            display: flex;
            gap: 1rem;
            justify-content: flex-start;
            font-size: 0.85rem;
            color: #b1c2e6;
        }
        .card-actions i {
            margin-right: 6px;
        }
        hr {
            border-color: #232b3f;
            margin: 0.5rem 0;
        }

        /* modal form */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(2, 4, 12, 0.85);
            backdrop-filter: blur(12px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-card {
            background: #0e1120e6;
            border: 1px solid var(--glow-cyan);
            border-radius: 32px;
            max-width: 560px;
            width: 90%;
            padding: 2rem;
            box-shadow: 0 20px 35px rgba(0,0,0,0.6);
        }
        .modal-card h2 {
            margin-bottom: 1.5rem;
            font-size: 1.6rem;
        }
        .modal-card input, .modal-card select, .modal-card textarea {
            width: 100%;
            margin: 0.6rem 0;
            padding: 0.8rem 1rem;
            background: #1a1f2c;
            border: 1px solid #2f3a5c;
            border-radius: 18px;
            color: white;
            font-family: inherit;
            transition: 0.2s;
        }
        .modal-card input:focus, .modal-card textarea:focus {
            outline: none;
            border-color: var(--glow-cyan);
            box-shadow: 0 0 5px cyan;
        }
        .modal-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
            margin-top: 1.5rem;
        }
        .btn-primary, .btn-secondary {
            padding: 0.6rem 1.3rem;
            border-radius: 40px;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-primary {
            background: linear-gradient(120deg, #0cb9ff, #a13eff);
            color: white;
        }
        .btn-secondary {
            background: #262e44;
            color: #ddd;
        }
        .file-hint {
            font-size: 0.7rem;
            color: #9aaac2;
            margin-top: -0.2rem;
            margin-bottom: 0.8rem;
        }
        .close-icon {
            float: right;
            font-size: 1.5rem;
            cursor: pointer;
        }
        .file-upload-area {
            background: #1a1f2e;
            border: 1px dashed var(--glow-cyan);
            border-radius: 24px;
            padding: 0.8rem;
            margin: 0.8rem 0;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
        }
        .file-upload-area:hover {
            background: #232a40;
            border-color: #0af;
        }
        .file-upload-area i {
            font-size: 1.8rem;
            color: var(--glow-cyan);
            margin-bottom: 5px;
            display: inline-block;
        }
        .file-info {
            font-size: 0.75rem;
            margin-top: 8px;
            word-break: break-all;
        }
        .preview-box {
            margin-top: 12px;
            max-height: 140px;
            border-radius: 20px;
            overflow: hidden;
        }
        .preview-box img, .preview-box video {
            max-width: 100%;
            max-height: 130px;
            border-radius: 16px;
            border: 1px solid cyan;
        }

        @media (max-width: 680px) {
            .app-container {
                padding: 1rem;
            }
            .feed-grid {
                grid-template-columns: 1fr;
            }
        }
        .empty-feed {
            text-align: center;
            padding: 3rem;
            background: #0f1322;
            border-radius: 40px;
            color: #6a789e;
        }
        .delete-btn {
            cursor: pointer;
            transition: 0.2s;
        }
        .delete-btn:hover {
            color: #ff7b8a;
        }
        .download-plugin-btn {
            background: none;
            border: none;
            color: #0af;
            cursor: pointer;
            margin-left: 0.5rem;
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <div class="logo">
            <h1>◈ RootLab ◈</h1>
            <span>official — загружай плагины, фото, видео через проводник</span>
        </div>
        <button class="new-post-btn" id="openModalBtn"><i class="fas fa-plus-circle"></i> Опубликовать</button>
    </div>

    <div class="tabs-filter">
        <button class="tab-btn active" data-filter="all"><i class="fas fa-globe"></i> Всё</button>
        <button class="tab-btn" data-filter="plugin"><i class="fas fa-puzzle-piece"></i> Плагины</button>
        <button class="tab-btn" data-filter="post"><i class="fas fa-newspaper"></i> Посты</button>
        <button class="tab-btn" data-filter="photo"><i class="fas fa-image"></i> Фото</button>
        <button class="tab-btn" data-filter="video"><i class="fas fa-video"></i> Видео</button>
    </div>

    <div id="feedContainer" class="feed-grid"></div>
</div>

<!-- Модальное окно: публикация с загрузкой файлов (плагины — через скрепку) -->
<div id="postModal" class="modal">
    <div class="modal-card">
        <i class="fas fa-times close-icon" id="closeModalBtn"></i>
        <h2><i class="fas fa-flask"></i> Новая публикация</h2>
        <form id="publishForm">
            <select id="contentType" required>
                <option value="post">📄 Пост (текст)</option>
                <option value="plugin">🔌 Плагин (загрузить архив .zip/.rar/.vst3)</option>
                <option value="photo">🖼️ Фото (из галереи)</option>
                <option value="video">🎥 Видео (из файлов)</option>
            </select>
            <input type="text" id="titleInput" placeholder="Заголовок *" required>
            <textarea id="descInput" rows="3" placeholder="Описание / контент..."></textarea>
            
            <!-- Динамическое поле для плагина (скрепка, выбор файла) -->
            <div id="dynamicPluginField" style="display: none;">
                <div class="file-upload-area" id="pluginUploadArea">
                    <i class="fas fa-paperclip fa-lg"></i> <i class="fas fa-cube"></i>
                    <div>Прикрепить плагин (архив или файл)</div>
                    <input type="file" id="pluginFileInput" accept=".zip,.rar,.vst3,.dll,.so,.vst,.aax,application/zip,application/x-rar-compressed" style="display: none;">
                    <div id="pluginFileName" class="file-info"></div>
                </div>
                <div class="file-hint">Поддерживаются .zip, .rar, .vst3 и другие файлы плагинов (до 20 МБ).</div>
            </div>
            
            <!-- Поле для медиа (фото/видео) -->
            <div id="dynamicMediaField" style="display: none;">
                <div class="file-upload-area" id="mediaUploadArea">
                    <i class="fas fa-folder-open"></i> <i class="fas fa-image" id="mediaTypeIcon"></i>
                    <div>Выбрать файл с устройства</div>
                    <input type="file" id="mediaFileInput" accept="image/*,video/*" style="display: none;">
                    <div id="selectedFileName" class="file-info"></div>
                </div>
                <div id="mediaPreview" class="preview-box"></div>
                <div class="file-hint">Фото JPG/PNG/GIF или видео MP4/WebM (до 15 МБ).</div>
            </div>

            <div class="modal-buttons">
                <button type="button" class="btn-secondary" id="cancelModalBtn">Отмена</button>
                <button type="submit" class="btn-primary"><i class="fas fa-paper-plane"></i> Опубликовать</button>
            </div>
        </form>
    </div>
</div>

<script>
    // ---------- Глобальное хранилище постов (в LocalStorage) ----------
    let posts = [];

    function loadPostsFromStorage() {
        const stored = localStorage.getItem('rootlab_plugin_media_files');
        if(stored) {
            posts = JSON.parse(stored);
        } else {
            // Демо-контент (без ссылок на скачивание плагинов, только локальный пример)
            posts = [
                { id: Date.now()+1, type: 'plugin', title: 'Root Spectral Processor', description: 'Плагин для спектральной обработки звука с AI-фильтрами.', pluginData: { name: 'RootSpectral.zip', base64: null, size: 0 }, createdAt: new Date().toISOString(), isPluginDemo: true, demoPluginName: 'RootSpectral.zip' },
                { id: Date.now()+2, type: 'post', title: 'RootLab Обновление: теперь загружайте плагины через проводник', description: 'Мы добавили возможность прикреплять файлы плагинов прямо из вашего телефона или ПК! Никаких ссылок.', createdAt: new Date().toISOString() },
                { id: Date.now()+3, type: 'photo', title: 'Интерфейс RootLab Studio', description: 'Новый дизайн концепт', mediaBase64: 'https://picsum.photos/id/104/500/300', isExternal: true, createdAt: new Date().toISOString() },
                { id: Date.now()+4, type: 'video', title: 'Как установить плагин?', description: 'Видео-инструкция', mediaBase64: 'https://sample-videos.com/video123/mp4/720/big_buck_bunny_720p_1mb.mp4', isExternal: true, createdAt: new Date().toISOString() }
            ];
            savePostsToStorage();
        }
        renderFeed('all');
    }

    function savePostsToStorage() {
        localStorage.setItem('rootlab_plugin_media_files', JSON.stringify(posts));
    }

    function addPost(postData) {
        const newPost = { id: Date.now(), createdAt: new Date().toISOString(), ...postData };
        posts.unshift(newPost);
        savePostsToStorage();
        renderFeed(currentFilter);
    }

    let currentFilter = 'all';

    function renderFeed(filterType) {
        const container = document.getElementById('feedContainer');
        let filteredPosts = posts.filter(p => filterType === 'all' ? true : p.type === filterType);
        if(filteredPosts.length === 0) {
            container.innerHTML = `<div class="empty-feed"><i class="fas fa-cube fa-2x"></i><p>Публикаций пока нет. Нажмите "Опубликовать" и загрузите плагин или медиа!</p></div>`;
            return;
        }

        container.innerHTML = filteredPosts.map(post => {
            let mediaHtml = '';
            let badgeContent = '';
            let extraMeta = '';

            if(post.type === 'plugin') {
                badgeContent = '<span class="badge-type"><i class="fas fa-puzzle-piece"></i> Плагин</span>';
                let pluginFileName = (post.pluginData && post.pluginData.name) ? post.pluginData.name : (post.demoPluginName || 'plugin_file.bin');
                let downloadAllowed = (post.pluginData && post.pluginData.base64) ? true : false;
                extraMeta = `<div class="plugin-details">
                                <i class="fas fa-paperclip"></i> ${escapeHtml(pluginFileName)} 
                                ${downloadAllowed ? `<button class="download-plugin-btn" data-id="${post.id}" style="background:none; border:none; color:#0af; cursor:pointer;"><i class="fas fa-download"></i> Скачать</button>` : '<span style="color:#aaa;"> (демо-файл недоступен для скачивания)</span>'}
                             </div>`;
                mediaHtml = `<div class="plugin-placeholder"><i class="fas fa-cube fa-3x"></i><i class="fas fa-paperclip"></i><span style="font-size: 12px;">Файл плагина</span></div>`;
            }
            else if(post.type === 'post') {
                badgeContent = '<span class="badge-type"><i class="fas fa-align-left"></i> Пост</span>';
                mediaHtml = `<div class="img-placeholder" style="background: #14202e;"><i class="fas fa-newspaper fa-2x"></i> RootLab insider</div>`;
            }
            else if(post.type === 'photo') {
                badgeContent = '<span class="badge-type"><i class="fas fa-camera"></i> Фотография</span>';
                if(post.mediaBase64) {
                    mediaHtml = `<img class="card-img" src="${post.mediaBase64}" alt="photo" onerror="this.src='https://placehold.co/600x400/1a1f2c/cyan?text=Ошибка+загрузки';">`;
                } else {
                    mediaHtml = `<div class="img-placeholder"><i class="fas fa-image fa-3x"></i></div>`;
                }
            }
            else if(post.type === 'video') {
                badgeContent = '<span class="badge-type"><i class="fas fa-play"></i> Видео</span>';
                if(post.mediaBase64) {
                    if(post.isExternal && !post.mediaBase64.startsWith('data:')) {
                        if(post.mediaBase64.match(/\.(mp4|webm)$/i)) {
                            mediaHtml = `<video class="card-video" controls preload="metadata"><source src="${post.mediaBase64}" type="video/mp4"></video>`;
                        } else {
                            mediaHtml = `<div class="img-placeholder"><i class="fas fa-video"></i> <a href="${post.mediaBase64}" target="_blank">Открыть видео</a></div>`;
                        }
                    } else {
                        mediaHtml = `<video class="card-video" controls><source src="${post.mediaBase64}" type="video/mp4"></video>`;
                    }
                } else {
                    mediaHtml = `<div class="img-placeholder"><i class="fas fa-link"></i> нет видео</div>`;
                }
            }

            const date = new Date(post.createdAt);
            const formattedDate = date.toLocaleDateString('ru-RU', { day:'numeric', month:'short', year:'numeric' });
            return `
                <div class="post-card" data-id="${post.id}">
                    <div class="card-media">${mediaHtml}</div>
                    <div class="card-content">
                        ${badgeContent}
                        <div class="post-title">${escapeHtml(post.title)}</div>
                        <div class="post-desc">${escapeHtml(post.description) || '— без описания —'}</div>
                        ${extraMeta}
                        <hr>
                        <div class="card-actions">
                            <span><i class="far fa-calendar-alt"></i> ${formattedDate}</span>
                            <span><i class="far fa-heart"></i> ❤ 0</span>
                            <span class="delete-post-btn" data-id="${post.id}" style="cursor:pointer; margin-left:auto; color:#ff7780;"><i class="fas fa-trash-alt"></i> Удалить</span>
                        </div>
                    </div>
                </div>
            `;
        }).join('');

        // Обработка удаления
        document.querySelectorAll('.delete-post-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const id = parseInt(btn.getAttribute('data-id'));
                deletePostById(id);
            });
        });
        // Обработка скачивания плагинов (если base64 существует)
        document.querySelectorAll('.download-plugin-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const postId = parseInt(btn.getAttribute('data-id'));
                const post = posts.find(p => p.id === postId);
                if(post && post.pluginData && post.pluginData.base64) {
                    const link = document.createElement('a');
                    link.href = post.pluginData.base64;
                    link.download = post.pluginData.name || 'plugin_file';
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                } else {
                    alert("Файл плагина недоступен для скачивания (демо-запись). Загрузите свой плагин через форму!");
                }
            });
        });
    }

    function deletePostById(id) {
        posts = posts.filter(p => p.id !== id);
        savePostsToStorage();
        renderFeed(currentFilter);
    }

    function escapeHtml(str) {
        if(!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if(m === '&') return '&amp;';
            if(m === '<') return '&lt;';
            if(m === '>') return '&gt;';
            return m;
        });
    }

    // ---------- ЛОГИКa ЗАГРУЗКИ ФАЙЛОВ (ПЛАГИНЫ + МЕДИА) ----------
    const contentTypeSelect = document.getElementById('contentType');
    const pluginFieldDiv = document.getElementById('dynamicPluginField');
    const mediaFieldDiv = document.getElementById('dynamicMediaField');
    
    // Плагин файл
    const pluginFileInput = document.getElementById('pluginFileInput');
    const pluginUploadArea = document.getElementById('pluginUploadArea');
    const pluginFileNameSpan = document.getElementById('pluginFileName');
    let selectedPluginFile = null; // { name, base64, size }
    
    // Медиа файл
    const mediaFileInput = document.getElementById('mediaFileInput');
    const mediaUploadArea = document.getElementById('mediaUploadArea');
    const selectedFileNameSpan = document.getElementById('selectedFileName');
    const mediaPreviewDiv = document.getElementById('mediaPreview');
    let selectedMediaBase64 = null, selectedMediaType = null;

    function resetPluginSelection() {
        selectedPluginFile = null;
        if(pluginFileInput) pluginFileInput.value = '';
        if(pluginFileNameSpan) pluginFileNameSpan.innerText = '';
    }
    function resetMediaSelection() {
        selectedMediaBase64 = null;
        selectedMediaType = null;
        if(mediaFileInput) mediaFileInput.value = '';
        if(selectedFileNameSpan) selectedFileNameSpan.innerText = '';
        if(mediaPreviewDiv) mediaPreviewDiv.innerHTML = '';
    }

    // Открытие выбора плагина
    if(pluginUploadArea) {
        pluginUploadArea.addEventListener('click', () => pluginFileInput.click());
        pluginFileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if(!file) return;
            const maxSize = 20 * 1024 * 1024;
            if(file.size > maxSize) {
                alert("Файл плагина слишком большой! Максимум 20 МБ");
                pluginFileInput.value = '';
                return;
            }
            const reader = new FileReader();
            reader.onload = (ev) => {
                selectedPluginFile = {
                    name: file.name,
                    base64: ev.target.result,
                    size: file.size
                };
                pluginFileNameSpan.innerText = `📎 ${file.name} (${(file.size/1024).toFixed(1)} КБ)`;
            };
            reader.readAsDataURL(file);
        });
    }
    
    // Медиа (фото/видео) выбор
    if(mediaUploadArea) {
        mediaUploadArea.addEventListener('click', () => mediaFileInput.click());
        mediaFileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if(!file) return;
            const type = contentTypeSelect.value;
            const isImage = file.type.startsWith('image/');
            const isVideo = file.type.startsWith('video/');
            if(type === 'photo' && !isImage) { alert("Выберите изображение!"); return; }
            if(type === 'video' && !isVideo) { alert("Выберите видеофайл!"); return; }
            const maxSize = 15 * 1024 * 1024;
            if(file.size > maxSize) { alert("Файл слишком большой (макс 15 МБ)"); return; }
            const reader = new FileReader();
            reader.onload = (ev) => {
                selectedMediaBase64 = ev.target.result;
                selectedMediaType = type;
                selectedFileNameSpan.innerText = `📁 ${file.name} (${(file.size/1024).toFixed(1)} КБ)`;
                if(mediaPreviewDiv) {
                    if(isImage) mediaPreviewDiv.innerHTML = `<img src="${selectedMediaBase64}" style="max-width:100%; max-height:130px; border-radius:16px;">`;
                    else if(isVideo) mediaPreviewDiv.innerHTML = `<video src="${selectedMediaBase64}" controls style="max-width:100%; max-height:130px;"></video>`;
                }
            };
            reader.readAsDataURL(file);
        });
    }

    function toggleDynamicFields() {
        const type = contentTypeSelect.value;
        pluginFieldDiv.style.display = 'none';
        mediaFieldDiv.style.display = 'none';
        resetPluginSelection();
        resetMediaSelection();
        if(type === 'plugin') {
            pluginFieldDiv.style.display = 'block';
        } else if(type === 'photo' || type === 'video') {
            mediaFieldDiv.style.display = 'block';
        }
    }
    contentTypeSelect.addEventListener('change', toggleDynamicFields);

    // ---------- Модальное окно и отправка ----------
    const modal = document.getElementById('postModal');
    const openBtn = document.getElementById('openModalBtn');
    const closeModalBtns = ['closeModalBtn', 'cancelModalBtn'];
    const publishForm = document.getElementById('publishForm');

    function openModal() { modal.style.display = 'flex'; toggleDynamicFields(); }
    function closeModal() { modal.style.display = 'none'; publishForm.reset(); toggleDynamicFields(); resetPluginSelection(); resetMediaSelection(); }
    openBtn.addEventListener('click', openModal);
    closeModalBtns.forEach(id => { const el = document.getElementById(id); if(el) el.addEventListener('click', closeModal); });
    window.addEventListener('click', (e) => { if(e.target === modal) closeModal(); });

    publishForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const type = contentTypeSelect.value;
        const title = document.getElementById('titleInput').value.trim();
        const description = document.getElementById('descInput').value.trim();
        if(!title) { alert("Укажите заголовок"); return; }
        let newEntry = { type, title, description };
        if(type === 'plugin') {
            if(!selectedPluginFile) { alert("Прикрепите файл плагина (скрепка)!"); return; }
            newEntry.pluginData = {
                name: selectedPluginFile.name,
                base64: selectedPluginFile.base64,
                size: selectedPluginFile.size
            };
        }
        else if(type === 'photo' || type === 'video') {
            if(!selectedMediaBase64) { alert(`Выберите ${type === 'photo' ? 'фото' : 'видео'} с устройства!`); return; }
            newEntry.mediaBase64 = selectedMediaBase64;
            newEntry.isExternal = false;
        }
        addPost(newEntry);
        closeModal();
    });

    // ТАБЫ
    const tabBtns = document.querySelectorAll('.tab-btn');
    tabBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            tabBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentFilter = btn.getAttribute('data-filter');
            renderFeed(currentFilter);
        });
    });
    loadPostsFromStorage();
</script>
</body>
</html>
