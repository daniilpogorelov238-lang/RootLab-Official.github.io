<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>RootLab Official | Платформа для плагинов и контента</title>
    <!-- Font Awesome Icons (v6 free) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts: Inter + Space Grotesk -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0c12;
            font-family: 'Inter', sans-serif;
            color: #eef2ff;
            line-height: 1.5;
            scroll-behavior: smooth;
        }

        /* glass + neon theme */
        :root {
            --glow-cyan: #00f2ff;
            --glow-purple: #b624ff;
            --bg-dark: #0a0c12;
            --card-bg: rgba(18, 22, 35, 0.75);
            --border-neon: rgba(0, 242, 255, 0.25);
            --accent: #00e0ff;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #141a2a;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--glow-cyan);
            border-radius: 8px;
        }

        /* layout */
        .app-container {
            max-width: 1440px;
            margin: 0 auto;
            padding: 1.5rem 2rem;
        }

        /* header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(0, 242, 255, 0.3);
        }
        .logo h1 {
            font-family: 'Space Grotesk', monospace;
            font-size: 1.9rem;
            background: linear-gradient(135deg, #fff, var(--glow-cyan), var(--glow-purple));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }
        .logo span {
            font-size: 0.8rem;
            color: #7e8a9c;
            display: block;
        }
        .new-post-btn {
            background: linear-gradient(95deg, #00c3ff20, #9d4eff20);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-neon);
            padding: 0.7rem 1.5rem;
            border-radius: 60px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .new-post-btn:hover {
            border-color: var(--glow-cyan);
            box-shadow: 0 0 12px rgba(0, 242, 255, 0.3);
            transform: scale(1.02);
        }

        /* filter tabs */
        .tabs-filter {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
            border-bottom: 1px solid #1f2538;
            padding-bottom: 0.75rem;
        }
        .tab-btn {
            background: transparent;
            border: none;
            color: #9aa4bf;
            font-size: 1rem;
            font-weight: 600;
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .tab-btn i {
            font-size: 1.1rem;
        }
        .tab-btn.active {
            background: rgba(0, 242, 255, 0.15);
            color: var(--glow-cyan);
            box-shadow: 0 0 6px rgba(0,242,255,0.2);
            border: 1px solid rgba(0,242,255,0.4);
        }
        .tab-btn:hover:not(.active) {
            color: white;
            background: #1e253e;
        }

        /* grid cards */
        .feed-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.8rem;
            margin-top: 1rem;
        }
        .post-card {
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            border-radius: 28px;
            border: 1px solid rgba(0, 242, 255, 0.2);
            overflow: hidden;
            transition: all 0.25s ease;
            box-shadow: 0 12px 28px -8px rgba(0,0,0,0.5);
        }
        .post-card:hover {
            border-color: var(--glow-cyan);
            transform: translateY(-5px);
            box-shadow: 0 20px 32px -12px rgba(0,242,255,0.2);
        }
        .card-media {
            width: 100%;
            max-height: 220px;
            object-fit: cover;
            background: #10141f;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .img-placeholder, .video-placeholder {
            width: 100%;
            height: 180px;
            background: #11161f;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: var(--glow-cyan);
        }
        img.card-img, video.card-video {
            width: 100%;
            display: block;
            max-height: 220px;
            object-fit: cover;
        }
        .card-content {
            padding: 1.2rem 1.2rem 1.4rem;
        }
        .badge-type {
            display: inline-block;
            font-size: 0.7rem;
            text-transform: uppercase;
            background: #1f2a44;
            padding: 0.2rem 0.7rem;
            border-radius: 30px;
            margin-bottom: 0.7rem;
            letter-spacing: 1px;
            color: #a7c0ff;
        }
        .post-title {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #fff, #b0e0ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .post-desc {
            color: #b9c3de;
            margin: 0.6rem 0;
            font-size: 0.9rem;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .plugin-details {
            background: #00000030;
            border-radius: 20px;
            padding: 0.5rem 0.8rem;
            font-size: 0.8rem;
            margin: 0.7rem 0;
            font-family: monospace;
            border-left: 3px solid var(--glow-cyan);
        }
        .card-actions {
            margin-top: 1rem;
            display: flex;
            gap: 1rem;
            justify-content: flex-start;
            font-size: 0.85rem;
            color: #b1c2e6;
        }
        .card-actions i {
            margin-right: 6px;
        }
        hr {
            border-color: #232b3f;
            margin: 0.5rem 0;
        }

        /* modal form */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(2, 4, 12, 0.85);
            backdrop-filter: blur(12px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-card {
            background: #0e1120e6;
            border: 1px solid var(--glow-cyan);
            border-radius: 32px;
            max-width: 550px;
            width: 90%;
            padding: 2rem;
            box-shadow: 0 20px 35px rgba(0,0,0,0.6);
        }
        .modal-card h2 {
            margin-bottom: 1.5rem;
            font-size: 1.6rem;
        }
        .modal-card input, .modal-card select, .modal-card textarea {
            width: 100%;
            margin: 0.6rem 0;
            padding: 0.8rem 1rem;
            background: #1a1f2c;
            border: 1px solid #2f3a5c;
            border-radius: 18px;
            color: white;
            font-family: inherit;
            transition: 0.2s;
        }
        .modal-card input:focus, .modal-card textarea:focus {
            outline: none;
            border-color: var(--glow-cyan);
            box-shadow: 0 0 5px cyan;
        }
        .modal-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
            margin-top: 1.5rem;
        }
        .btn-primary, .btn-secondary {
            padding: 0.6rem 1.3rem;
            border-radius: 40px;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-primary {
            background: linear-gradient(120deg, #0cb9ff, #a13eff);
            color: white;
        }
        .btn-secondary {
            background: #262e44;
            color: #ddd;
        }
        .file-hint {
            font-size: 0.7rem;
            color: #9aaac2;
            margin-top: -0.2rem;
            margin-bottom: 0.8rem;
        }
        .close-icon {
            float: right;
            font-size: 1.5rem;
            cursor: pointer;
        }

        @media (max-width: 680px) {
            .app-container {
                padding: 1rem;
            }
            .feed-grid {
                grid-template-columns: 1fr;
            }
        }
        .empty-feed {
            text-align: center;
            padding: 3rem;
            background: #0f1322;
            border-radius: 40px;
            color: #6a789e;
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <div class="logo">
            <h1>◈ RootLab ◈</h1>
            <span>official — креативная лаборатория плагинов & контента</span>
        </div>
        <button class="new-post-btn" id="openModalBtn"><i class="fas fa-plus-circle"></i> Опубликовать</button>
    </div>

    <!-- Фильтр по типам контента -->
    <div class="tabs-filter">
        <button class="tab-btn active" data-filter="all"><i class="fas fa-globe"></i> Всё</button>
        <button class="tab-btn" data-filter="plugin"><i class="fas fa-puzzle-piece"></i> Плагины</button>
        <button class="tab-btn" data-filter="post"><i class="fas fa-newspaper"></i> Посты</button>
        <button class="tab-btn" data-filter="photo"><i class="fas fa-image"></i> Фото</button>
        <button class="tab-btn" data-filter="video"><i class="fas fa-video"></i> Видео</button>
    </div>

    <!-- Лента контента -->
    <div id="feedContainer" class="feed-grid">
        <!-- динамически загружаемые карточки -->
    </div>
</div>

<!-- Модальное окно для создания публикации -->
<div id="postModal" class="modal">
    <div class="modal-card">
        <i class="fas fa-times close-icon" id="closeModalBtn"></i>
        <h2><i class="fas fa-flask"></i> Новая публикация</h2>
        <form id="publishForm">
            <select id="contentType" required>
                <option value="post">📄 Пост (текст)</option>
                <option value="plugin">🔌 Плагин (программный модуль)</option>
                <option value="photo">🖼️ Фото (изображение)</option>
                <option value="video">🎥 Видео (ссылка или embed)</option>
            </select>
            <input type="text" id="titleInput" placeholder="Заголовок *" required>
            <textarea id="descInput" rows="3" placeholder="Описание / контент..."></textarea>
            
            <!-- динамические поля под плагины и медиа -->
            <div id="dynamicPluginField" style="display: none;">
                <input type="text" id="pluginVersion" placeholder="Версия плагина (например 2.0.0)">
                <input type="text" id="pluginDownloadUrl" placeholder="Ссылка на скачивание .zip / github">
            </div>
            <div id="dynamicMediaField" style="display: none;">
                <input type="text" id="mediaUrl" placeholder="URL изображения или видео (прямая ссылка)">
                <div class="file-hint">Поддерживается .jpg, .png, .mp4, YouTube embed? (ссылка на превью)</div>
            </div>

            <div class="modal-buttons">
                <button type="button" class="btn-secondary" id="cancelModalBtn">Отмена</button>
                <button type="submit" class="btn-primary"><i class="fas fa-paper-plane"></i> Опубликовать</button>
            </div>
        </form>
    </div>
</div>

<script>
    // ---------- Глобальное хранилище постов (в LocalStorage) ----------
    let posts = [];

    // Загрузка сохраненных данных
    function loadPostsFromStorage() {
        const stored = localStorage.getItem('rootlab_posts');
        if(stored) {
            posts = JSON.parse(stored);
        } else {
            // демо-данные для красивого старта
            posts = [
                { id: Date.now()+1, type: 'plugin', title: 'Root Synth Engine', description: 'Мощный аудио-плагин для синтеза bass и glitch эффектов. VST3 / AU.', pluginVersion: '1.4.2', pluginDownloadUrl: 'https://rootlab.xyz/downloads/rootsynth.zip', createdAt: new Date().toISOString() },
                { id: Date.now()+2, type: 'post', title: 'Анонс: RootLab Community Week', description: 'С 10 по 16 июня проведём воркшопы по разработке плагинов! Участвуйте и выигрывайте лицензии.', createdAt: new Date().toISOString() },
                { id: Date.now()+3, type: 'photo', title: 'Неоновая студия', description: 'Концепт арт новой обложки для пакета визуалов', mediaUrl: 'https://picsum.photos/id/104/500/300', createdAt: new Date().toISOString() },
                { id: Date.now()+4, type: 'video', title: 'Трейлер RootLab 2.0', description: 'Короткий ролик с демонстрацией платформы', mediaUrl: 'https://sample-videos.com/video123/mp4/720/big_buck_bunny_720p_1mb.mp4', createdAt: new Date().toISOString() }
            ];
            savePostsToStorage();
        }
        renderFeed('all');
    }

    function savePostsToStorage() {
        localStorage.setItem('rootlab_posts', JSON.stringify(posts));
    }

    // добавить пост
    function addPost(postData) {
        const newPost = {
            id: Date.now(),
            createdAt: new Date().toISOString(),
            ...postData
        };
        posts.unshift(newPost); // новые сверху
        savePostsToStorage();
        renderFeed(currentFilter);
    }

    // вспомогательная отрисовка
    let currentFilter = 'all';

    function renderFeed(filterType) {
        const container = document.getElementById('feedContainer');
        let filteredPosts = posts.filter(p => filterType === 'all' ? true : p.type === filterType);
        
        if(filteredPosts.length === 0) {
            container.innerHTML = `<div class="empty-feed"><i class="fas fa-cube fa-2x"></i><p>Публикаций пока нет. Станьте первым автором в RootLab!</p></div>`;
            return;
        }

        container.innerHTML = filteredPosts.map(post => {
            // Определяем отображение в зависимости от типа
            let mediaHtml = '';
            let badgeContent = '';
            let extraMeta = '';
            
            if(post.type === 'plugin') {
                badgeContent = '<span class="badge-type"><i class="fas fa-puzzle-piece"></i> Плагин</span>';
                extraMeta = `<div class="plugin-details">
                                <i class="fas fa-code-branch"></i> версия ${post.pluginVersion || '1.0'} &nbsp;|&nbsp; 
                                <i class="fas fa-download"></i> <a href="${post.pluginDownloadUrl || '#'}" target="_blank" style="color:#0af;">Скачать</a>
                             </div>`;
            } else if(post.type === 'post') {
                badgeContent = '<span class="badge-type"><i class="fas fa-align-left"></i> Пост</span>';
            } else if(post.type === 'photo') {
                badgeContent = '<span class="badge-type"><i class="fas fa-camera"></i> Фотография</span>';
                if(post.mediaUrl) {
                    mediaHtml = `<img class="card-img" src="${post.mediaUrl}" alt="photo preview" onerror="this.onerror=null;this.src='https://placehold.co/600x400/1a1f2c/cyan?text=Image+error';">`;
                } else {
                    mediaHtml = `<div class="img-placeholder"><i class="fas fa-image fa-3x"></i></div>`;
                }
            } else if(post.type === 'video') {
                badgeContent = '<span class="badge-type"><i class="fas fa-play"></i> Видео</span>';
                if(post.mediaUrl) {
                    // Если ссылка ведёт на видео-файл, используем <video>, иначе показываем ссылку на превью
                    if(post.mediaUrl.match(/\.(mp4|webm|ogg)$/i)) {
                        mediaHtml = `<video class="card-video" controls preload="metadata"><source src="${post.mediaUrl}" type="video/mp4">Ваш браузер не поддерживает видео</video>`;
                    } else {
                        mediaHtml = `<div class="img-placeholder"><i class="fas fa-video"></i> <a href="${post.mediaUrl}" target="_blank" style="color:#0af;">Открыть видео</a></div>`;
                    }
                } else {
                    mediaHtml = `<div class="img-placeholder"><i class="fas fa-link"></i> нет ссылки</div>`;
                }
            }

            // для постов и плагинов дефолтная заглушка
            if(post.type === 'post' || post.type === 'plugin') {
                if(post.type === 'post') mediaHtml = `<div class="img-placeholder" style="background: #14202e;"><i class="fas fa-newspaper fa-2x"></i> RootLab insider</div>`;
                if(post.type === 'plugin') mediaHtml = `<div class="img-placeholder"><i class="fas fa-cube fa-2x"></i> Релиз плагина</div>`;
            }

            // дата формат
            const date = new Date(post.createdAt);
            const formattedDate = date.toLocaleDateString('ru-RU', {day:'numeric', month:'short', year:'numeric'});
            
            return `
                <div class="post-card" data-id="${post.id}">
                    <div class="card-media">
                        ${mediaHtml}
                    </div>
                    <div class="card-content">
                        ${badgeContent}
                        <div class="post-title">${escapeHtml(post.title)}</div>
                        <div class="post-desc">${escapeHtml(post.description) || '— без описания —'}</div>
                        ${extraMeta}
                        <hr>
                        <div class="card-actions">
                            <span><i class="far fa-calendar-alt"></i> ${formattedDate}</span>
                            <span><i class="far fa-heart"></i> ❤ 0</span>
                            <span class="delete-post-btn" data-id="${post.id}" style="cursor:pointer; margin-left:auto; color:#ff7780;"><i class="fas fa-trash-alt"></i> Удалить</span>
                        </div>
                    </div>
                </div>
            `;
        }).join('');

        // Добавляем обработчики удаления после отрисовки
        document.querySelectorAll('.delete-post-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const id = parseInt(btn.getAttribute('data-id'));
                deletePostById(id);
            });
        });
    }

    function deletePostById(id) {
        posts = posts.filter(p => p.id !== id);
        savePostsToStorage();
        renderFeed(currentFilter);
    }

    function escapeHtml(str) {
        if(!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if(m === '&') return '&amp;';
            if(m === '<') return '&lt;';
            if(m === '>') return '&gt;';
            return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
            return c;
        });
    }

    // динамическое управление полями в модалке
    const contentTypeSelect = document.getElementById('contentType');
    const pluginFieldDiv = document.getElementById('dynamicPluginField');
    const mediaFieldDiv = document.getElementById('dynamicMediaField');
    
    function toggleDynamicFields() {
        const type = contentTypeSelect.value;
        pluginFieldDiv.style.display = 'none';
        mediaFieldDiv.style.display = 'none';
        if(type === 'plugin') {
            pluginFieldDiv.style.display = 'block';
        } else if(type === 'photo' || type === 'video') {
            mediaFieldDiv.style.display = 'block';
        }
    }
    contentTypeSelect.addEventListener('change', toggleDynamicFields);
    
    // модалка логика
    const modal = document.getElementById('postModal');
    const openBtn = document.getElementById('openModalBtn');
    const closeBtns = ['closeModalBtn', 'cancelModalBtn'];
    const publishForm = document.getElementById('publishForm');

    function openModal() { modal.style.display = 'flex'; toggleDynamicFields(); }
    function closeModal() { modal.style.display = 'none'; publishForm.reset(); pluginFieldDiv.style.display = 'none'; mediaFieldDiv.style.display = 'none'; }

    openBtn.addEventListener('click', openModal);
    closeBtns.forEach(id => {
        const el = document.getElementById(id);
        if(el) el.addEventListener('click', closeModal);
    });
    window.addEventListener('click', (e) => { if(e.target === modal) closeModal(); });

    publishForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const type = contentTypeSelect.value;
        const title = document.getElementById('titleInput').value.trim();
        const description = document.getElementById('descInput').value.trim();
        if(!title) {
            alert("Заголовок обязателен!");
            return;
        }
        let newEntry = { type, title, description };
        
        if(type === 'plugin') {
            const pluginVersion = document.getElementById('pluginVersion').value.trim() || '1.0';
            const pluginDownloadUrl = document.getElementById('pluginDownloadUrl').value.trim();
            if(!pluginDownloadUrl) {
                alert("Для плагина укажите ссылку на скачивание");
                return;
            }
            newEntry.pluginVersion = pluginVersion;
            newEntry.pluginDownloadUrl = pluginDownloadUrl;
        }
        else if(type === 'photo' || type === 'video') {
            const mediaUrl = document.getElementById('mediaUrl').value.trim();
            if(!mediaUrl) {
                alert(`Укажите URL для ${type === 'photo' ? 'изображения' : 'видео'}`);
                return;
            }
            newEntry.mediaUrl = mediaUrl;
        }
        addPost(newEntry);
        closeModal();
    });
    
    // табы фильтрации
    const tabBtns = document.querySelectorAll('.tab-btn');
    tabBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            tabBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentFilter = btn.getAttribute('data-filter');
            renderFeed(currentFilter);
        });
    });

    // инициализация приложения
    loadPostsFromStorage();
</script>
</body>
</html>
