<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>RootLab Cloud | Глобальная лаборатория контента</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: radial-gradient(circle at 10% 20%, #0a0c12, #030507);
            font-family: 'Inter', sans-serif;
            color: #eef5ff;
            padding: 2rem 1.5rem;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        /* анимация загрузки */
        .loader-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            flex-direction: column;
            gap: 1rem;
            font-weight: 600;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #2effe0;
            border-top: 4px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            margin-bottom: 2rem;
            border-bottom: 1px solid rgba(0, 255, 255, 0.2);
            padding-bottom: 1rem;
        }
        .logo h1 { font-size: 2rem; font-weight: 800; background: linear-gradient(135deg, #aaffff, #2a7fff); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .badge-cloud {
            background: #0a5c4e33;
            padding: 0.3rem 0.9rem;
            border-radius: 40px;
            font-size: 0.7rem;
            border: 1px solid #2effe0;
        }
        .creation-panel {
            background: rgba(12, 18, 28, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            border: 1px solid rgba(0, 255, 255, 0.25);
            padding: 1.6rem 2rem;
            margin-bottom: 2rem;
        }
        input, select, textarea {
            width: 100%;
            background: #0b1018;
            border: 1px solid #2a3448;
            border-radius: 1.2rem;
            padding: 0.9rem 1.2rem;
            font-family: 'Inter', monospace;
            color: #f0f4fa;
        }
        .type-buttons {
            display: flex;
            gap: 1rem;
            margin: 1rem 0;
            flex-wrap: wrap;
        }
        .type-btn {
            background: #111a24;
            border: 1px solid #2d3a4b;
            border-radius: 2rem;
            padding: 0.6rem 1.4rem;
            cursor: pointer;
        }
        .type-btn.active {
            background: #1e90ff33;
            border-color: #0ff;
            box-shadow: 0 0 6px cyan;
        }
        .btn-publish {
            background: linear-gradient(95deg, #00c3ff, #2b5eff);
            border: none;
            padding: 0.9rem;
            border-radius: 2rem;
            font-weight: 700;
            color: white;
            cursor: pointer;
            width: 100%;
        }
        .sync-toolbar {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
        }
        .sync-btn {
            background: #1e2a3a;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            color: white;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .posts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
        }
        .post-card {
            background: rgba(8, 14, 22, 0.8);
            border-radius: 1.5rem;
            border: 1px solid rgba(72, 187, 255, 0.2);
            overflow: hidden;
        }
        .media-container {
            width: 100%;
            max-height: 200px;
            overflow: hidden;
            background: #010101;
            text-align: center;
        }
        .media-container img, .media-container video {
            width: 100%;
            object-fit: cover;
            max-height: 200px;
        }
        .post-content { padding: 1rem; }
        .delete-post {
            background: none;
            border: none;
            color: #ff8181;
            cursor: pointer;
        }
        .empty-feed {
            text-align: center;
            padding: 3rem;
            background: #07101c60;
            border-radius: 2rem;
        }
        footer {
            margin-top: 3rem;
            text-align: center;
            font-size: 0.7rem;
            color: #4a6588;
        }
        @media (max-width: 700px) {
            body { padding: 1rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">
            <h1><i class="fas fa-globe"></i> RootLab Cloud</h1>
            <p>глобальная лаборатория • публикации для всех</p>
        </div>
        <div class="badge-cloud" id="cloudStatusBadge">
            <i class="fas fa-sync-alt"></i> <span id="statusText">Определение режима...</span>
        </div>
    </div>

    <div class="creation-panel">
        <h3 style="margin-bottom: 1rem;"><i class="fas fa-plus-circle"></i> Новая публикация</h3>
        <input type="text" id="postTitle" placeholder="Заголовок / Название плагина">
        <textarea id="postDesc" rows="2" placeholder="Описание..." style="margin-top: 0.8rem;"></textarea>
        
        <div class="type-buttons" id="typeSelector">
            <div class="type-btn" data-type="post"><i class="fas fa-paragraph"></i> Пост</div>
            <div class="type-btn" data-type="plugin"><i class="fas fa-puzzle-piece"></i> Плагин</div>
            <div class="type-btn" data-type="image"><i class="fas fa-image"></i> Картинка</div>
            <div class="type-btn" data-type="video"><i class="fas fa-video"></i> Видео</div>
        </div>

        <div style="display: flex; gap: 0.8rem; margin: 0.8rem 0;">
            <input type="text" id="mediaUrl" placeholder="URL медиа / ссылка на плагин (опционально)" style="flex:2">
            <input type="file" id="fileUpload" accept="image/*,video/*" style="flex:1; background:#0e1622;">
        </div>
        <button class="btn-publish" id="publishBtn"><i class="fas fa-rocket"></i> Опубликовать для всех</button>
    </div>

    <div class="sync-toolbar">
        <div>
            <button id="refreshBtn" class="sync-btn"><i class="fas fa-download"></i> Синхронизировать</button>
            <button id="exportJsonBtn" class="sync-btn"><i class="fas fa-file-export"></i> Экспорт JSON</button>
            <button id="importJsonBtn" class="sync-btn"><i class="fas fa-file-import"></i> Импорт JSON</button>
        </div>
        <div>
            <button id="clearAllBtn" class="sync-btn" style="background:#aa2e4e;"><i class="fas fa-trash-alt"></i> Очистить всё</button>
        </div>
    </div>

    <div id="postsContainer" class="posts-grid">
        <div class="empty-feed">🌍 Загрузка глобальной ленты RootLab...</div>
    </div>
    <footer>
        ⚡ Режим: <span id="modeDesc">локальный</span> • Для постоянного облака: разверните Cloudflare Worker (инструкция в коде)
    </footer>
</div>

<script>
    // ==================== КОНФИГУРАЦИЯ CLOUDFLARE WORKER ====================
    // Бесплатный глобальный бэкенд. Инструкция:
    // 1. Зайдите в Cloudflare Dashboard → Workers & Pages → Create Worker
    // 2. Вставьте код из блока ниже (в <!-- WORKER CODE -->)
    // 3. Скопируйте URL вашего worker (например https://rootlab.yourname.workers.dev)
    // 4. Вставьте его сюда:
    const CLOUD_WORKER_URL = "https://rootlab-api.your-worker.workers.dev"; // 🔁 ЗАМЕНИТЕ НА ВАШ URL!
    // ======================================================================
    
    // Режим работы: 'local' или 'cloud'
    let currentMode = 'local';
    let feedItems = [];
    
    // DOM элементы
    const container = document.getElementById('postsContainer');
    const publishBtn = document.getElementById('publishBtn');
    const refreshBtn = document.getElementById('refreshBtn');
    const clearAllBtn = document.getElementById('clearAllBtn');
    const exportBtn = document.getElementById('exportJsonBtn');
    const importBtn = document.getElementById('importJsonBtn');
    const statusSpan = document.getElementById('statusText');
    const modeDescSpan = document.getElementById('modeDesc');
    
    let currentType = 'post';
    
    // --- Вспомогательные функции ---
    function showLoader(show) {
        let loader = document.querySelector('.loader-overlay');
        if(show) {
            if(!loader) {
                const div = document.createElement('div');
                div.className = 'loader-overlay';
                div.innerHTML = '<div class="spinner"></div><div>Синхронизация RootLab...</div>';
                document.body.appendChild(div);
            }
        } else {
            if(loader) loader.remove();
        }
    }
    
    function escapeHtml(str) {
        if(!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if(m === '&') return '&amp;';
            if(m === '<') return '&lt;';
            if(m === '>') return '&gt;';
            return m;
        });
    }
    
    // --- Локальное хранилище ---
    function saveToLocal() {
        localStorage.setItem('rootlab_local_feed', JSON.stringify(feedItems));
    }
    
    function loadFromLocal() {
        const stored = localStorage.getItem('rootlab_local_feed');
        if(stored) {
            try { feedItems = JSON.parse(stored); } catch(e) { feedItems = []; }
        } else {
            // демо-данные
            feedItems = [
                { id: Date.now()+1, type: 'plugin', title: 'CloudSync Kit', desc: 'Плагин для мгновенной синхронизации', mediaUrl: '', fileDataUrl: null, timestamp: Date.now() - 3600000 },
                { id: Date.now()+2, type: 'image', title: 'Глобальная лаборатория', desc: 'Концепт RootLab Network', mediaUrl: 'https://picsum.photos/id/106/500/300', fileDataUrl: null, timestamp: Date.now() - 7200000 }
            ];
            saveToLocal();
        }
    }
    
    // --- Облачные API (Worker KV) ---
    async function testCloudConnection() {
        if(!CLOUD_WORKER_URL || CLOUD_WORKER_URL.includes('your-worker')) return false;
        try {
            const res = await fetch(`${CLOUD_WORKER_URL}/ping`, { method: 'GET', cache: 'no-store' });
            if(res.ok) return true;
        } catch(e) { return false; }
        return false;
    }
    
    async function fetchCloudData() {
        if(currentMode !== 'cloud') return null;
        try {
            const res = await fetch(`${CLOUD_WORKER_URL}/items`);
            if(res.ok) {
                const data = await res.json();
                return data.items || [];
            }
        } catch(e) { console.warn("Cloud fetch error", e); }
        return null;
    }
    
    async function pushCloudData(items) {
        if(currentMode !== 'cloud') return false;
        try {
            const res = await fetch(`${CLOUD_WORKER_URL}/sync`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ items: items })
            });
            return res.ok;
        } catch(e) { return false; }
    }
    
    async function deleteCloudItem(itemId) {
        if(currentMode !== 'cloud') return false;
        try {
            const res = await fetch(`${CLOUD_WORKER_URL}/delete/${itemId}`, { method: 'DELETE' });
            return res.ok;
        } catch(e) { return false; }
    }
    
    async function clearCloud() {
        if(currentMode !== 'cloud') return false;
        try {
            const res = await fetch(`${CLOUD_WORKER_URL}/clear`, { method: 'DELETE' });
            return res.ok;
        } catch(e) { return false; }
    }
    
    // --- Инициализация режима ---
    async function initMode() {
        showLoader(true);
        const cloudReachable = await testCloudConnection();
        if(cloudReachable && CLOUD_WORKER_URL && !CLOUD_WORKER_URL.includes('your-worker')) {
            currentMode = 'cloud';
            statusSpan.innerHTML = '<i class="fas fa-cloud-upload-alt"></i> Облако активно';
            modeDescSpan.innerText = 'ГЛОБАЛЬНЫЙ (Cloudflare KV)';
            await loadCloudToMemory();
        } else {
            currentMode = 'local';
            statusSpan.innerHTML = '<i class="fas fa-database"></i> Локальный режим';
            modeDescSpan.innerText = 'локальный (только этот браузер)';
            loadFromLocal();
            renderFeed();
        }
        showLoader(false);
        updateStatsDisplay();
    }
    
    async function loadCloudToMemory() {
        const cloudItems = await fetchCloudData();
        if(cloudItems && Array.isArray(cloudItems)) {
            feedItems = cloudItems;
            renderFeed();
            saveToLocal(); // кэш
        } else {
            // если облако пустое, попробуем поднять локальные
            loadFromLocal();
            await pushCloudData(feedItems);
            renderFeed();
        }
    }
    
    // --- Рендер + удаление / синхронизация ---
    function renderFeed() {
        if(!container) return;
        if(feedItems.length === 0) {
            container.innerHTML = `<div class="empty-feed">🧪 Лаборатория пуста. Создайте первую публикацию! 🧪</div>`;
            updateStatsDisplay();
            return;
        }
        let html = '';
        [...feedItems].reverse().forEach(item => {
            const { id, type, title, desc, mediaUrl, fileDataUrl } = item;
            let finalMedia = (fileDataUrl && fileDataUrl.startsWith('data:')) ? fileDataUrl : mediaUrl;
            let mediaTag = '';
            let typeIcon = '';
            if(type === 'image') {
                typeIcon = '<i class="fas fa-image"></i> Изображение';
                mediaTag = finalMedia ? `<div class="media-container"><img src="${escapeHtml(finalMedia)}" onerror="this.src='https://placehold.co/600x400/1a1f2e/ff66cc?text=Ошибка'" loading="lazy"></div>` : `<div class="media-container">🖼️ нет превью</div>`;
            } else if(type === 'video') {
                typeIcon = '<i class="fas fa-video"></i> Видео';
                mediaTag = finalMedia ? `<div class="media-container"><video controls src="${escapeHtml(finalMedia)}" style="max-height:200px;"></video></div>` : `<div class="media-container">🎬 видео без источника</div>`;
            } else if(type === 'plugin') {
                typeIcon = '<i class="fas fa-puzzle-piece"></i> Плагин';
                mediaTag = `<div class="media-container" style="padding:0.8rem;"><i class="fas fa-code-branch"></i> ${finalMedia ? `<a href="${escapeHtml(finalMedia)}" target="_blank">Ссылка</a>` : 'Демо-режим'}</div>`;
            } else {
                typeIcon = '<i class="fas fa-newspaper"></i> Пост';
                mediaTag = `<div class="media-container" style="padding:0.7rem;">${finalMedia ? `<i class="fas fa-link"></i> <a href="${escapeHtml(finalMedia)}" target="_blank">Ресурс</a>` : 'Текстовый пост'}</div>`;
            }
            const dateStr = item.timestamp ? new Date(item.timestamp).toLocaleString() : '—';
            html += `
                <div class="post-card" data-id="${id}">
                    ${mediaTag}
                    <div class="post-content">
                        <div><span class="post-type-icon">${typeIcon}</span></div>
                        <div class="post-title"><strong>${escapeHtml(title) || 'Без названия'}</strong></div>
                        <div class="post-desc">${escapeHtml(desc || '')}</div>
                        <div class="post-meta" style="display:flex; justify-content:space-between; margin-top:0.7rem;">
                            <small>${dateStr}</small>
                            <button class="delete-post" data-id="${id}"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                </div>`;
        });
        container.innerHTML = html;
        attachDeleteEvents();
        updateStatsDisplay();
        if(currentMode === 'cloud') pushCloudData(feedItems).catch(console.warn);
        else saveToLocal();
    }
    
    function attachDeleteEvents() {
        document.querySelectorAll('.delete-post').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                e.stopPropagation();
                const id = parseInt(btn.getAttribute('data-id'));
                if(currentMode === 'cloud') {
                    showLoader(true);
                    await deleteCloudItem(id);
                    feedItems = feedItems.filter(i => i.id !== id);
                    await pushCloudData(feedItems);
                    renderFeed();
                    showLoader(false);
                } else {
                    feedItems = feedItems.filter(i => i.id !== id);
                    renderFeed();
                }
            });
        });
    }
    
    function updateStatsDisplay() {
        const countSpan = document.getElementById('postCount');
        if(countSpan) countSpan.innerText = feedItems.length;
        else {
            const header = document.querySelector('.badge-cloud');
            if(header && !document.getElementById('postCount')) {
                const span = document.createElement('span');
                span.id = 'postCount';
                span.style.marginLeft='0.8rem';
                header.appendChild(span);
            }
            const pc = document.getElementById('postCount');
            if(pc) pc.innerText = `📦 ${feedItems.length}`;
        }
    }
    
    // --- Добавление новой публикации с файлами ---
    function readFileAsDataURL(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result);
            reader.onerror = reject;
            reader.readAsDataURL(file);
        });
    }
    
    publishBtn.addEventListener('click', async () => {
        const title = document.getElementById('postTitle').value.trim();
        const desc = document.getElementById('postDesc').value.trim();
        let mediaUrl = document.getElementById('mediaUrl').value.trim();
        const file = document.getElementById('fileUpload').files[0];
        let fileDataUrl = null;
        if(!title) { alert("Введите заголовок"); return; }
        
        if(file) {
            if(currentType === 'image' && !file.type.startsWith('image/')) { alert("Нужно изображение"); return; }
            if(currentType === 'video' && !file.type.startsWith('video/')) { alert("Нужно видео"); return; }
            fileDataUrl = await readFileAsDataURL(file);
            mediaUrl = '';
        } else if((currentType === 'image' || currentType === 'video') && !mediaUrl) {
            alert("Для картинки/видео нужен URL или файл");
            return;
        }
        
        const newItem = {
            id: Date.now(),
            type: currentType,
            title: title,
            desc: desc || '',
            mediaUrl: mediaUrl,
            fileDataUrl: fileDataUrl,
            timestamp: Date.now()
        };
        feedItems.unshift(newItem);
        if(currentMode === 'cloud') {
            showLoader(true);
            await pushCloudData(feedItems);
            showLoader(false);
        }
        renderFeed();
        document.getElementById('postTitle').value = '';
        document.getElementById('postDesc').value = '';
        document.getElementById('mediaUrl').value = '';
        document.getElementById('fileUpload').value = '';
    });
    
    // Синхронизация вручную
    refreshBtn.addEventListener('click', async () => {
        if(currentMode === 'cloud') {
            showLoader(true);
            await loadCloudToMemory();
            showLoader(false);
        } else {
            loadFromLocal();
            renderFeed();
        }
    });
    
    clearAllBtn.addEventListener('click', async () => {
        if(confirm("Удалить ВСЕ публикации для всех пользователей?")) {
            if(currentMode === 'cloud') {
                showLoader(true);
                await clearCloud();
                feedItems = [];
                await pushCloudData(feedItems);
                renderFeed();
                showLoader(false);
            } else {
                feedItems = [];
                renderFeed();
            }
        }
    });
    
    // Экспорт/импорт JSON (переносимость)
    exportBtn.addEventListener('click', () => {
        const dataStr = JSON.stringify(feedItems, null, 2);
        const blob = new Blob([dataStr], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `rootlab_backup_${Date.now()}.json`;
        a.click();
        URL.revokeObjectURL(url);
    });
    
    importBtn.addEventListener('click', () => {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'application/json';
        input.onchange = async (e) => {
            const file = e.target.files[0];
            if(!file) return;
            const text = await file.text();
            try {
                const imported = JSON.parse(text);
                if(Array.isArray(imported)) {
                    feedItems = imported;
                    if(currentMode === 'cloud') {
                        showLoader(true);
                        await pushCloudData(feedItems);
                        showLoader(false);
                    }
                    renderFeed();
                    alert("Импорт выполнен");
                } else throw new Error();
            } catch(err) { alert("Неверный JSON"); }
        };
        input.click();
    });
    
    // --- тип контента ---
    document.querySelectorAll('.type-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentType = btn.getAttribute('data-type');
        });
    });
    document.querySelector('.type-btn').classList.add('active');
    
    initMode();
</script>

</html>
