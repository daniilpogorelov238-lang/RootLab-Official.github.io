<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>RootLab | Official — Плагины, посты, канал</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0b0e14;
      color: #eef2ff;
      line-height: 1.5;
    }
    .logo-glow {
      background: linear-gradient(135deg, #a855f7, #3b82f6);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      font-weight: 800;
    }
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 2rem;
      background: rgba(12, 16, 24, 0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(139, 92, 246, 0.2);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo h1 { font-size: 1.8rem; letter-spacing: -0.5px; }
    .logo span { background: linear-gradient(135deg, #c084fc, #60a5fa); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .nav-links { display: flex; gap: 2rem; align-items: center; }
    .nav-links a { color: #cbd5e6; text-decoration: none; font-weight: 500; transition: 0.2s; }
    .nav-links a:hover, .nav-links a.active { color: #c084fc; }
    .profile-icon {
      font-size: 1.6rem; cursor: pointer; background: #1e293b; width: 42px; height: 42px;
      border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: 0.2s;
    }
    .profile-icon:hover { background: #3b2e5e; transform: scale(1.02); }
    .container { max-width: 1300px; margin: 0 auto; padding: 2rem 1.5rem; }
    .grid-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.8rem; margin-top: 2rem; }
    .card {
      background: #11161f; border-radius: 1.5rem; padding: 1.2rem; border: 1px solid #2d3748;
      transition: all 0.2s ease; box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }
    .card:hover { border-color: #8b5cf6; transform: translateY(-4px); }
    .card img, .card video { width: 100%; border-radius: 1rem; max-height: 220px; object-fit: cover; background: #0a0f16; display: block; }
    .card h3 { margin: 0.8rem 0 0.4rem; font-size: 1.3rem; }
    .card p { color: #9ca3af; font-size: 0.9rem; }
    .badge { background: #2d1b4e; padding: 0.2rem 0.8rem; border-radius: 20px; font-size: 0.7rem; display: inline-block; margin-top: 0.5rem; }
    .create-post {
      background: #10141e; border-radius: 1.5rem; padding: 1.5rem; margin-bottom: 2rem; border: 1px solid #2a3448;
    }
    .create-post input, .create-post textarea, .create-post select {
      width: 100%; background: #1a1f2c; border: 1px solid #334155; border-radius: 1rem;
      padding: 0.8rem 1rem; color: white; font-family: inherit; margin-bottom: 1rem;
    }
    .btn {
      background: linear-gradient(95deg, #7c3aed, #3b82f6); border: none; padding: 0.8rem 1.5rem;
      border-radius: 2rem; font-weight: bold; color: white; cursor: pointer; transition: 0.2s;
    }
    .btn-outline { background: transparent; border: 1px solid #8b5cf6; }
    .modal {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8);
      backdrop-filter: blur(5px); align-items: center; justify-content: center; z-index: 200;
    }
    .modal-content {
      background: #11161f; max-width: 450px; width: 90%; padding: 2rem; border-radius: 2rem; border: 1px solid #4c1d95;
    }
    .close-modal { float: right; font-size: 1.8rem; cursor: pointer; }
    .profile-avatar { background: #8b5cf6; width: 80px; height: 80px; font-size: 3rem; display: flex; align-items: center; justify-content: center; border-radius: 50%; margin: 0 auto 1rem; }
    .tg-integration, .zen-integration { background: #1a2538; padding: 0.8rem; border-radius: 1rem; margin-top: 1rem; }
    footer { text-align: center; padding: 2rem; color: #5b6e8c; border-top: 1px solid #1f2937; }
    .media-placeholder {
      background: linear-gradient(135deg, #1e293b, #0f172a);
      height: 160px;
      border-radius: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #5b6e8c;
      font-size: 0.9rem;
      gap: 0.5rem;
    }
    @media (max-width: 700px) { .navbar { flex-direction: column; gap: 0.8rem; } .nav-links { flex-wrap: wrap; justify-content: center; } }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="logo"><h1><span class="logo-glow">🔧 RootLab</span> | Official</h1></div>
  <div class="nav-links">
    <a href="#" class="nav-link active" data-page="home">🏠 Главная</a>
    <a href="#" class="nav-link" data-page="plugins">📦 Плагины</a>
    <a href="#" class="nav-link" data-page="channel">📺 Мой канал</a>
    <div class="profile-icon" id="openProfileBtn">👱</div>
  </div>
</nav>

<div class="container" id="appContainer"><div id="pageContent"></div></div>

<footer><p>RootLab Official — интеграция с Яндекс.Дзен и Telegram | Все плагины и посты уникальны</p></footer>

<div id="profileModal" class="modal">
  <div class="modal-content">
    <span class="close-modal" id="closeModalBtn">&times;</span>
    <div class="profile-avatar" id="avatarPreview">👱</div>
    <h3 style="text-align:center">Мой профиль</h3>
    <label>Имя пользователя</label>
    <input type="text" id="profileName" placeholder="RootLab Official" style="width:100%; margin:8px 0; padding:8px; border-radius:12px; background:#1e293b; color:white; border:none;">
    <label>Email</label>
    <input type="email" id="profileEmail" placeholder="pogorelovdanya@bk.ru" style="width:100%; margin:8px 0; padding:8px; border-radius:12px; background:#1e293b; color:white; border:none;">
    <label>Telegram аккаунт (юзернейм)</label>
    <input type="text" id="tgUsername" placeholder="@bezvlasti" style="width:100%; margin:8px 0; padding:8px; border-radius:12px;">
    <label>Яндекс Дзен канал (ссылка или ID)</label>
    <input type="text" id="zenChannel" placeholder="https://dzen.ru/id/6252aef9a2b8ec473f6038c6" style="width:100%; margin:8px 0; padding:8px; border-radius:12px;">
    <button class="btn" id="saveProfileBtn" style="margin-top:1rem; width:100%">Сохранить настройки</button>
    <div class="tg-integration"><i class="fab fa-telegram"></i> <strong>Telegram интеграция</strong><br><small>Посты отправляются в ваш канал</small></div>
    <div class="zen-integration"><i class="fab fa-yandex"></i> <strong>Яндекс.Дзен интеграция</strong><br><small>Публикация постов на ваш канал</small></div>
  </div>
</div>

<script>
  // НАЧАЛЬНЫЙ ПОСТ С РАБОЧЕЙ КАРТИНКОЙ (логотип RootLab)
  let plugins = [
    { id: 1, name: "SEO Booster Pro", desc: "Оптимизация метатегов и скорость", version: "2.1.0", type: "plugin" },
    { id: 2, name: "ContentGuard", desc: "Защита контента от копирования", version: "1.4.2", type: "plugin" }
  ];
  
  let posts = [
    { 
      id: "p1", 
      author: "RootLab", 
      title: "Анонс RootTools v3", 
      content: "Новая версия плагина для работы с сервером. Расширенные возможности и оптимизация.", 
      media: "", 
      mediaType: "", 
      date: new Date().toLocaleDateString() 
    },
    { 
      id: "p2", 
      author: "RootLab", 
      title: "Как продвигать канал в Дзен?", 
      content: "Делюсь опытом интеграции с RootLab. Полный гайд по настройке и публикации контента.", 
      media: "https://avatars.mds.yandex.net/i?id=2a00000179e3b7a8c4e5f6d7a8b9c0d1e2f3a4b5", 
      mediaType: "image", 
      date: new Date().toLocaleDateString() 
    }
  ];

  let currentUser = { name: "RootMaster", email: "root@rootlab.com", tg: "@rootlab_official", zen: "https://zen.yandex.ru/rootlab" };
  
  function loadData() {
    const storedPlugins = localStorage.getItem("rootlab_plugins");
    const storedPosts = localStorage.getItem("rootlab_posts");
    const storedUser = localStorage.getItem("rootlab_user");
    if(storedPlugins) plugins = JSON.parse(storedPlugins);
    if(storedPosts) posts = JSON.parse(storedPosts);
    if(storedUser) currentUser = JSON.parse(storedUser);
  }
  function saveAll() {
    localStorage.setItem("rootlab_plugins", JSON.stringify(plugins));
    localStorage.setItem("rootlab_posts", JSON.stringify(posts));
    localStorage.setItem("rootlab_user", JSON.stringify(currentUser));
  }

  function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;});}

  // Функция отображения медиа
  function renderMedia(mediaUrl, mediaType) {
    if(mediaUrl && mediaUrl.trim() !== "") {
      if(mediaType === 'video') {
        return `<video controls src="${escapeHtml(mediaUrl)}"></video>`;
      } else {
        return `<img src="${escapeHtml(mediaUrl)}" alt="Медиа контент" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'"><div class="media-placeholder" style="display:none"><i class="fas fa-image"></i> Изображение не загружено</div>`;
      }
    }
    return `<div class="media-placeholder"><i class="fas fa-pen"></i> Без медиа</div>`;
  }

  function renderHome() {
    return `
      <div class="create-post">
        <h3><i class="fas fa-pen-fancy"></i> Создать новый пост / плагин</h3>
        <input type="text" id="postTitle" placeholder="Заголовок поста или название плагина">
        <textarea id="postDesc" rows="3" placeholder="Описание / текст"></textarea>
        <select id="postTypeSelect"><option value="post">📝 Пост (в канал)</option><option value="plugin">🔌 Плагин (в каталог)</option></select>
        <input type="text" id="mediaUrl" placeholder="Ссылка на фото или видео (можно прямую ссылку с картинкой)">
        <div style="display:flex; gap: 10px; flex-wrap:wrap;">
          <button class="btn" id="publishPostBtn">➕ Опубликовать</button>
          <button class="btn btn-outline" id="publishToZenBtn">🌐 Опубликовать в Яндекс.Дзен</button>
          <button class="btn btn-outline" id="publishToTelegramBtn">📲 Отправить в Telegram</button>
        </div>
        <div style="margin-top:10px; font-size:12px; color:#5b6e8c;"><i class="fas fa-info-circle"></i> Для фото: прямая ссылка на .jpg/.png. Для видео: ссылка на .mp4</div>
      </div>
      <h2><i class="fas fa-rss"></i> Лента постов канала</h2>
      <div class="grid-cards" id="postsList">
        ${posts.map(post => `
          <div class="card">
            ${renderMedia(post.media, post.mediaType)}
            <h3>${escapeHtml(post.title)}</h3>
            <p>${escapeHtml(post.content)}</p>
            <div class="badge">📅 ${post.date} | ✍️ ${escapeHtml(post.author)}</div>
          </div>
        `).join('')}
        ${posts.length === 0 ? '<p>Пока нет постов. Создайте первый!</p>' : ''}
      </div>
    `;
  }

  function renderPlugins() {
    return `<h2><i class="fas fa-plug"></i> Библиотека плагинов RootLab</h2><div class="grid-cards">${plugins.map(p => `<div class="card"><i class="fas fa-cube" style="font-size: 2rem; color:#a78bfa"></i><h3>${escapeHtml(p.name)} v${p.version}</h3><p>${escapeHtml(p.desc)}</p><button class="btn" style="margin-top:10px" onclick="alert('Скачивание ${p.name}')">⬇️ Скачать плагин</button></div>`).join('')}</div><p style="margin-top:2rem"><i class="fas fa-info-circle"></i> Чтобы добавить плагин, создайте пост с типом "Плагин"</p>`;
  }

  function renderChannel() {
    return `<h2><i class="fas fa-tower-broadcast"></i> Управление каналом RootLab</h2><div style="background:#11161f; border-radius:1.5rem; padding:1.5rem; margin-bottom:2rem"><p><strong>📡 Яндекс.Дзен канал:</strong> <a href="${currentUser.zen}" target="_blank" style="color:#a78bfa">${currentUser.zen}</a></p><p><strong>✈️ Telegram:</strong> ${currentUser.tg}</p><p><strong>👤 Владелец:</strong> ${currentUser.name}</p><button class="btn" id="syncZenBtn" style="margin-top:0.8rem">🔄 Опубликовать последний пост в Дзен</button><button class="btn-outline btn" id="syncTgBtn">📨 Отправить последний пост в Telegram</button></div><h3>Последние посты канала</h3><div class="grid-cards">${posts.slice(0,3).map(post => `<div class="card"><h4>${escapeHtml(post.title)}</h4><p>${escapeHtml(post.content.substring(0,80))}...</p></div>`).join('')}</div>`;
  }

  function addPostOrPlugin(title, desc, mediaUrl, typeSel) {
    if(!title.trim()) return alert("Введите заголовок");
    if(typeSel === 'plugin') {
      plugins.push({ id: Date.now(), name: title, desc: desc || "Плагин от RootLab", version: "1.0", type: "plugin" });
      saveAll();
      alert(`Плагин "${title}" добавлен в каталог!`);
    } else {
      let mediaType = '', mediaFinal = '';
      if(mediaUrl && mediaUrl.trim()) { 
        mediaFinal = mediaUrl.trim(); 
        mediaType = mediaFinal.match(/\.(mp4|webm|mov)/i) ? 'video' : 'image'; 
      }
      posts.unshift({ id: Date.now().toString(), author: currentUser.name, title: title, content: desc, media: mediaFinal, mediaType: mediaType, date: new Date().toLocaleDateString() });
      saveAll();
      alert(`Пост "${title}" опубликован на канале!`);
    }
    renderCurrentPage();
  }

  function publishToZen(postTitle, postContent) { alert(`✅ Опубликовано в Яндекс.Дзен на канал ${currentUser.zen}\nЗаголовок: ${postTitle}\nТекст: ${postContent.substring(0,100)}`); }
  function publishToTelegram(message) { alert(`📱 Отправлено в Telegram (${currentUser.tg}):\n${message}`); }

  let currentPage = "home";
  function renderCurrentPage() {
    const container = document.getElementById("pageContent");
    if(currentPage === "home") container.innerHTML = renderHome();
    else if(currentPage === "plugins") container.innerHTML = renderPlugins();
    else if(currentPage === "channel") container.innerHTML = renderChannel();
    if(currentPage === "home") {
      document.getElementById("publishPostBtn")?.addEventListener("click", () => { addPostOrPlugin(document.getElementById("postTitle").value, document.getElementById("postDesc").value, document.getElementById("mediaUrl").value, document.getElementById("postTypeSelect").value); });
      document.getElementById("publishToZenBtn")?.addEventListener("click", () => { let t=document.getElementById("postTitle").value, c=document.getElementById("postDesc").value; if(!t) return alert("Заполните заголовок"); publishToZen(t,c); });
      document.getElementById("publishToTelegramBtn")?.addEventListener("click", () => { let t=document.getElementById("postTitle").value, c=document.getElementById("postDesc").value; if(!t) return; publishToTelegram(`Новый пост: ${t}\n${c}`); });
    }
    if(currentPage === "channel") {
      document.getElementById("syncZenBtn")?.addEventListener("click", () => { if(posts.length) publishToZen(posts[0].title, posts[0].content); else alert("Нет постов"); });
      document.getElementById("syncTgBtn")?.addEventListener("click", () => { if(posts.length) publishToTelegram(`Пост: ${posts[0].title}\n${posts[0].content}`); else alert("Нет постов"); });
    }
  }

  const modal = document.getElementById("profileModal");
  document.getElementById("openProfileBtn").onclick = () => { document.getElementById("profileName").value = currentUser.name; document.getElementById("profileEmail").value = currentUser.email; document.getElementById("tgUsername").value = currentUser.tg; document.getElementById("zenChannel").value = currentUser.zen; modal.style.display = "flex"; };
  document.getElementById("closeModalBtn").onclick = () => modal.style.display = "none";
  window.onclick = (e) => { if(e.target === modal) modal.style.display = "none"; };
  document.getElementById("saveProfileBtn")?.addEventListener("click", () => { currentUser.name = document.getElementById("profileName").value; currentUser.email = document.getElementById("profileEmail").value; currentUser.tg = document.getElementById("tgUsername").value; currentUser.zen = document.getElementById("zenChannel").value; saveAll(); modal.style.display = "none"; alert("Профиль обновлён"); renderCurrentPage(); });
  
  document.querySelectorAll(".nav-link").forEach(link => { link.addEventListener("click", (e) => { e.preventDefault(); document.querySelectorAll(".nav-link").forEach(l => l.classList.remove("active")); link.classList.add("active"); currentPage = link.getAttribute("data-page"); renderCurrentPage(); }); });
  
  loadData(); renderCurrentPage();
  setInterval(() => { const ap = document.getElementById("avatarPreview"); if(ap && currentUser.name) ap.innerText = currentUser.name.charAt(0).toUpperCase() || "👱"; }, 100);
</script>
</body>
                                                                                                        </html>
