<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RootLab Official</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Inter',sans-serif; background:#02040c; color:#f0f3fa; }
    .navbar {
      display:flex; justify-content:space-between; align-items:center;
      padding:1rem 2rem; background:rgba(8,12,22,0.98); border-bottom:1px solid #7c3aed60;
      position:sticky; top:0; z-index:100;
    }
    .logo h1 { font-size:1.9rem; background:linear-gradient(135deg,#c084fc,#3b82f6); -webkit-background-clip:text; color:transparent; }
    .nav-links a { color:#cbd5e6; margin:0 15px; text-decoration:none; font-weight:600; cursor:pointer; }
    .nav-links a:hover, .nav-links a.active { color:#c084fc; }

    .container { max-width:1400px; margin:0 auto; padding:2rem 1.8rem; }
    .grid-cards { display:grid; grid-template-columns:repeat(auto-fill,minmax(360px,1fr)); gap:2rem; }

    .card { background:#11161f; border-radius:1.8rem; padding:1.6rem; border:1px solid #2d3850; transition:0.3s; }
    .card:hover { border-color:#a855f7; transform:translateY(-6px); }

    .tag { background:#3b82f630; color:#60a5fa; padding:5px 12px; border-radius:20px; margin:4px 4px 4px 0; display:inline-block; }

    .btn { padding:0.9rem 1.6rem; border:none; border-radius:12px; font-weight:600; cursor:pointer; }
    .btn-primary { background:linear-gradient(135deg,#8b5cf6,#3b82f6); color:white; }

    .create-post { background:#0e121f; border-radius:2rem; padding:2rem; border:1px solid #334155; }
    input, textarea { width:100%; background:#0f1322; border:1px solid #2a3448; border-radius:12px; padding:1rem; color:white; margin-bottom:1rem; }
    .upload-area { border:2px dashed #64748b; border-radius:16px; padding:3rem; text-align:center; cursor:pointer; margin:15px 0; }
    .upload-area:hover { border-color:#a855f7; }

    .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); backdrop-filter:blur(12px); align-items:center; justify-content:center; z-index:1000; }
    .modal-content { background:#11161f; padding:2rem; border-radius:2rem; border:1px solid #8b5cf6; max-width:520px; width:92%; }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="logo"><h1>🔧 RootLab | Official</h1></div>
  <div class="nav-links">
    <a data-page="home">🏠 Главная</a>
    <a data-page="create">✍️ Создать</a>
    <a data-page="plugins">📦 Плагины</a>
    <a data-page="profile">👤 Профиль</a>
  </div>
</nav>

<div class="container">
  <div id="pageContent"></div>
</div>

<!-- Profile Modal -->
<div id="profileModal" class="modal">
  <div class="modal-content">
    <span onclick="closeProfileModal()" style="float:right;font-size:30px;cursor:pointer;">×</span>
    <div style="text-align:center;">
      <img id="profileAvatar" src="https://via.placeholder.com/120" style="width:120px;height:120px;border-radius:50%;border:4px solid #8b5cf6;">
      <h2 id="profileName"></h2>
      <p id="profileBio" style="color:#94a3b8;"></p>
    </div>
  </div>
</div>

<script>
// ==================== ДАННЫЕ ====================
let posts = [];
let currentUser = {
  name: "Ваше Имя",
  bio: "Расскажите о себе...",
  avatar: "https://via.placeholder.com/120/8b5cf6/ffffff?text=Вы",
  socials: []
};

let currentMedia = null;
let currentPostTags = [];

// ==================== LocalStorage ====================
function loadData() {
  posts = JSON.parse(localStorage.getItem("rootlab_posts") || "[]");
  currentUser = JSON.parse(localStorage.getItem("rootlab_user") || JSON.stringify(currentUser));
}

function saveData() {
  localStorage.setItem("rootlab_posts", JSON.stringify(posts));
  localStorage.setItem("rootlab_user", JSON.stringify(currentUser));
}

// ==================== Рендер страниц ====================
function showPage(page) {
  document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active'));
  document.querySelector(`[data-page="${page}"]`).classList.add('active');

  const content = document.getElementById("pageContent");

  if (page === "home") renderHome();
  else if (page === "create") renderCreate();
  else if (page === "plugins") renderPlugins();
  else if (page === "profile") renderProfile();
}

function renderHome() {
  document.getElementById("pageContent").innerHTML = `
    <h2>📢 Лента публикаций</h2>
    <div class="grid-cards" id="postsGrid"></div>
  `;
  renderPosts();
}

function renderPosts() {
  const grid = document.getElementById("postsGrid");
  grid.innerHTML = posts.map(p => `
    <div class="card">
      <h3>${p.title}</h3>
      <p>${p.content}</p>
      <div>\( {p.tags ? p.tags.map(tag => `<span class="tag"># \){tag}</span>`).join('') : ''}</div>
      \( {p.media ? (p.mediaType === 'video' ? `<video src=" \){p.media}" controls style="width:100%;border-radius:12px;margin:10px 0;"></video>` : `<img src="${p.media}" style="width:100%;border-radius:12px;margin:10px 0;">`) : ''}
      <small>${p.date}</small>
    </div>
  `).join('');
}

function renderCreate() {
  currentPostTags = [];
  currentMedia = null;
  document.getElementById("pageContent").innerHTML = `
    <div class="create-post">
      <h2>Создать пост / плагин</h2>
      <input type="text" id="title" placeholder="Название">
      <textarea id="content" rows="6" placeholder="Описание..."></textarea>
      
      <h3>Теги</h3>
      <div id="tagsContainer"></div>
      <input type="text" id="tagInput" placeholder="Тег + Enter" onkeypress="if(event.key==='Enter') addTag()">

      <div class="upload-area" id="uploadArea">
        <p>📎 Нажмите для загрузки фото или видео</p>
        <input type="file" id="fileInput" accept="image/*,video/*" style="display:none;">
      </div>

      <button onclick="publish()" class="btn btn-primary" style="width:100%;">Опубликовать</button>
    </div>
  `;

  document.getElementById("uploadArea").onclick = () => document.getElementById("fileInput").click();
  document.getElementById("fileInput").onchange = handleFile;
}

function handleFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    currentMedia = { url: reader.result, type: file.type.startsWith('video') ? 'video' : 'image' };
    document.getElementById("uploadArea").innerHTML = `<p>✅ ${file.name}</p>`;
  };
  reader.readAsDataURL(file);
}

window.addTag = function() {
  const input = document.getElementById("tagInput");
  const val = input.value.trim();
  if (val && !currentPostTags.includes(val)) {
    currentPostTags.push(val);
    input.value = "";
    document.getElementById("tagsContainer").innerHTML = currentPostTags.map((t,i) => 
      `<span class="tag" onclick="removeTag(\( {i})"># \){t} ×</span>`).join('');
  }
};

window.removeTag = function(i) {
  currentPostTags.splice(i,1);
  document.getElementById("tagsContainer").innerHTML = currentPostTags.map((t,i) => 
    `<span class="tag" onclick="removeTag(\( {i})"># \){t} ×</span>`).join('');
};

window.publish = function() {
  const title = document.getElementById("title").value.trim();
  const content = document.getElementById("content").value.trim();
  if (!title) return alert("Введите заголовок!");

  posts.unshift({
    id: Date.now().toString(),
    title,
    content,
    media: currentMedia ? currentMedia.url : "",
    mediaType: currentMedia ? currentMedia.type : "",
    date: new Date().toLocaleDateString('ru-RU'),
    tags: currentPostTags
  });

  saveData();
  alert("✅ Опубликовано!");
  showPage("home");
};

function renderPlugins() {
  document.getElementById("pageContent").innerHTML = `
    <h2>📦 Плагины</h2>
    <div class="grid-cards" id="pluginsGrid"></div>
  `;
  renderPosts(); // используем ту же функцию
}

function renderProfile() {
  let html = `
    <div class="create-post">
      <h2>👤 Мой профиль</h2>
      <input type="text" id="uName" value="${currentUser.name}">
      <textarea id="uBio">${currentUser.bio}</textarea>
      
      <h3>Социальные сети</h3>
      <div id="socialContainer"></div>
      <button onclick="addSocial()" class="btn" style="background:#334155;">+ Добавить сеть</button><br><br>
      <button onclick="saveUserProfile()" class="btn btn-primary" style="width:100%;">Сохранить</button>
    </div>
  `;
  document.getElementById("pageContent").innerHTML = html;
  renderSocialFields();
}

function renderSocialFields() {
  const cont = document.getElementById("socialContainer");
  cont.innerHTML = currentUser.socials.map((s,i) => `
    <div style="display:flex;gap:10px;margin-bottom:10px;">
      <input type="text" value="\( {s.name}" placeholder="Название" onchange="currentUser.socials[ \){i}].name=this.value">
      <input type="text" value="\( {s.url}" placeholder="Ссылка" onchange="currentUser.socials[ \){i}].url=this.value">
      <button onclick="deleteSocial(${i})" class="btn" style="background:#ef4444;color:white;">✕</button>
    </div>
  `).join('');
}

window.addSocial = function() {
  currentUser.socials.push({name:"", url:""});
  renderSocialFields();
};

window.deleteSocial = function(i) {
  currentUser.socials.splice(i,1);
  renderSocialFields();
};

window.saveUserProfile = function() {
  currentUser.name = document.getElementById("uName").value.trim() || "Пользователь";
  currentUser.bio = document.getElementById("uBio").value.trim();
  saveData();
  alert("✅ Профиль сохранён!");
};

// Навигация
document.querySelectorAll('.nav-links a').forEach(link => {
  link.addEventListener('click', () => showPage(link.dataset.page));
});

// Профиль в навбаре
document.getElementById("openProfileBtn") ? document.getElementById("openProfileBtn").addEventListener("click", () => {
  document.getElementById("profileName").textContent = currentUser.name;
  document.getElementById("profileBio").textContent = currentUser.bio;
  document.getElementById("profileModal").style.display = "flex";
}) : null;

window.closeProfileModal = () => document.getElementById("profileModal").style.display = "none";

// Запуск
loadData();
showPage("home");
</script>
</body>
</html>
