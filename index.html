<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RootLab Official — полный контроль</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #02040c;
      color: #f0f3fa;
      line-height: 1.6;
    }
    .navbar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 1rem 2rem; background: rgba(8,12,22,0.97); backdrop-filter: blur(16px);
      border-bottom: 1px solid #7c3aed60; position: sticky; top: 0; z-index: 100;
    }
    .logo h1 { font-size: 1.9rem; background: linear-gradient(135deg, #c084fc, #3b82f6); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .nav-links { display: flex; gap: 1.8rem; align-items: center; }
    .nav-links a { color: #cbd5e6; text-decoration: none; font-weight: 600; cursor: pointer; transition: 0.3s; }
    .nav-links a:hover, .nav-links a.active { color: #c084fc; }

    .container { max-width: 1400px; margin: 0 auto; padding: 2rem 1.8rem; }
    .grid-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 2rem; }

    .card {
      background: #11161f; border-radius: 1.8rem; padding: 1.6rem;
      border: 1px solid #2d3850; transition: all 0.3s;
    }
    .card:hover { border-color: #a855f7; transform: translateY(-6px); }

    .tag { display: inline-block; padding: 5px 13px; margin: 4px 4px 4px 0; background: #3b82f630; color: #60a5fa; border-radius: 9999px; font-size: 0.82rem; cursor: pointer; }

    .btn {
      padding: 0.85rem 1.6rem; border: none; border-radius: 1rem;
      font-weight: 600; cursor: pointer; transition: 0.3s;
    }
    .btn-primary { background: linear-gradient(135deg, #8b5cf6, #3b82f6); color: white; }
    .btn-primary:hover { transform: scale(1.05); }

    .create-post, .modal-content {
      background: #0e121f; border-radius: 2rem; padding: 2rem; border: 1px solid #334155;
    }
    input, textarea { width: 100%; background: #0f1322; border: 1px solid #2a3448; border-radius: 1.2rem; padding: 1rem; color: white; margin-bottom: 1rem; }
    .upload-area { border: 2px dashed #64748b; border-radius: 1.5rem; padding: 3rem; text-align: center; cursor: pointer; }
    .upload-area:hover { border-color: #a855f7; }

    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(12px); align-items: center; justify-content: center; z-index: 1000; }
    .post-actions { display: flex; gap: 20px; margin-top: 15px; color: #94a3b8; font-size: 1.1rem; }
    .comment { background: #1a2233; padding: 12px; border-radius: 12px; margin-top: 10px; }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="logo"><h1>🔧 RootLab | Official</h1></div>
  <div class="nav-links">
    <a class="nav-link active" data-page="home">🏠 Главная</a>
    <a class="nav-link" data-page="create">✍️ Создать пост</a>
    <a class="nav-link" data-page="plugins">📦 Плагины</a>
    <a class="nav-link" data-page="channel">🔗 Мои ссылки</a>
    <div id="openProfileBtn" style="cursor:pointer; font-size:1.5rem;">👨‍🚀</div>
  </div>
</nav>

<div class="container">
  <div id="pageContent"></div>
</div>

<!-- Profile Modal -->
<div id="profileModal" class="modal">
  <div class="modal-content" style="max-width:500px;">
    <span onclick="closeProfileModal()" style="float:right; font-size:30px; cursor:pointer;">×</span>
    <div style="text-align:center; margin-bottom:20px;">
      <img id="profileAvatar" src="https://via.placeholder.com/120/8b5cf6/ffffff?text=RM" style="width:120px;height:120px;border-radius:50%; border:4px solid #8b5cf6;">
      <h2 id="profileName">RootMaster</h2>
      <p id="profileBio" style="color:#94a3b8;">Администратор RootLab</p>
    </div>
    <div id="socialLinksContainer"></div>
  </div>
</div>

<script>
// Все функции объявлены как глобальные
let posts = [];
let currentUser = {
  name: "RootMaster",
  bio: "Администратор RootLab • Полный контроль",
  avatar: "https://via.placeholder.com/120/8b5cf6/ffffff?text=RM",
  socials: [{ name: "Telegram", url: "https://t.me/RootLab_Official", icon: "fab fa-telegram" }]
};

const presetCategories = [
  { id: "all", name: "Все", tags: [] },
  { id: "magisk", name: "Magisk", tags: ["Magisk", "Zygisk"] },
  { id: "kernelsu", name: "KernelSU", tags: ["KernelSU"] },
  { id: "guides", name: "Гайды", tags: ["Гайд", "Root"] }
];

let selectedFilters = [];
let currentMedia = null;
let currentPostTags = [];

// Загрузка данных
function loadData() {
  posts = JSON.parse(localStorage.getItem("rootlab_posts") || "[]");
  currentUser = JSON.parse(localStorage.getItem("rootlab_user") || JSON.stringify(currentUser));

  if (posts.length === 0) {
    posts = [
      { id: "1", title: "Как получить root на Android 15", content: "Полное актуальное руководство", tags: ["Root", "Гайд"], date: "04.05.2026", likes: 42, comments: [] },
      { id: "2", title: "Shamiko v1.2 — скрытие root", content: "Лучший модуль на сегодня", tags: ["Magisk", "Shamiko"], date: "03.05.2026", likes: 67, comments: [] }
    ];
    saveData();
  }
}

function saveData() {
  localStorage.setItem("rootlab_posts", JSON.stringify(posts));
  localStorage.setItem("rootlab_user", JSON.stringify(currentUser));
}

// Основные функции рендера
function renderHome() {
  document.getElementById("pageContent").innerHTML = `
    <h2>📢 Лента публикаций</h2>
    <div style="margin:15px 0;"><strong>Категории:</strong><br><div id="categoryButtons"></div></div>
    <div id="selectedFilters" style="margin:10px 0; min-height:30px;"></div>
    <input type="text" id="searchInput" placeholder="🔍 Поиск..." style="width:100%;max-width:500px;margin-bottom:20px;" onkeyup="searchPosts()">
    <div class="grid-cards" id="postsGrid"></div>
  `;
  renderCategoryButtons();
  renderPosts();
}

function renderCategoryButtons() {
  const container = document.getElementById("categoryButtons");
  container.innerHTML = presetCategories.map(cat => 
    `<button onclick="toggleCategory('\( {cat.id}')" class="btn" style="margin-right:8px;"> \){cat.name}</button>`
  ).join('');
}

window.toggleCategory = function(id) {
  if (id === "all") selectedFilters = [];
  else {
    const cat = presetCategories.find(c => c.id === id);
    if (cat) cat.tags.forEach(tag => {
      if (!selectedFilters.includes(tag)) selectedFilters.push(tag);
    });
  }
  renderSelectedFilters();
  renderPosts();
};

function renderSelectedFilters() {
  const container = document.getElementById("selectedFilters");
  container.innerHTML = selectedFilters.map(tag => 
    `<span class="tag" onclick="removeFilter('\( {tag}')"># \){tag} ×</span>`
  ).join('');
}

window.removeFilter = function(tag) {
  selectedFilters = selectedFilters.filter(t => t !== tag);
  renderSelectedFilters();
  renderPosts();
};

function renderPosts(data = null) {
  const postsToShow = data || posts;
  const grid = document.getElementById("postsGrid");
  grid.innerHTML = postsToShow.map(post => `
    <div class="card">
      <h3>${post.title}</h3>
      <p>${post.content}</p>
      <div>\( {post.tags ? post.tags.map(t => `<span class="tag"># \){t}</span>`).join('') : ''}</div>
      \( {post.media ? (post.mediaType === 'video' ? `<video src=" \){post.media}" controls style="width:100%;border-radius:12px;margin:10px 0;"></video>` : `<img src="${post.media}" style="width:100%;border-radius:12px;margin:10px 0;">`) : ''}
      <small>${post.date}</small>
      <div class="post-actions">
        <span onclick="likePost('${post.id}')">❤️ ${post.likes || 0}</span>
        <span onclick="toggleComments('${post.id}')">💬 ${post.comments ? post.comments.length : 0}</span>
      </div>
      <div id="comments-${post.id}" style="display:none;margin-top:15px;"></div>
    </div>
  `).join('');
}

window.likePost = function(id) {
  const post = posts.find(p => p.id === id);
  if (post) {
    post.likes = (post.likes || 0) + 1;
    saveData();
    renderPosts();
  }
};

window.toggleComments = function(id) {
  const div = document.getElementById(`comments-${id}`);
  div.style.display = div.style.display === 'none' ? 'block' : 'none';
  if (div.style.display === 'block') renderCommentSection(id);
};

function renderCommentSection(id) {
  const post = posts.find(p => p.id === id);
  let html = `<h4>Комментарии</h4>`;
  if (post.comments && post.comments.length) {
    html += post.comments.map(c => `<div class="comment"><strong>${c.author}:</strong> ${c.text}</div>`).join('');
  }
  html += `
    <input type="text" id="cinput-${id}" placeholder="Напишите комментарий..." style="margin-top:10px;">
    <button onclick="addComment('${id}')" class="btn btn-primary">Отправить</button>
  `;
  document.getElementById(`comments-${id}`).innerHTML = html;
}

window.addComment = function(id) {
  const input = document.getElementById(`cinput-${id}`);
  if (!input.value.trim()) return;
  const post = posts.find(p => p.id === id);
  if (post) {
    if (!post.comments) post.comments = [];
    post.comments.push({author: currentUser.name, text: input.value.trim()});
    saveData();
    renderCommentSection(id);
  }
};

window.searchPosts = function() {
  const term = document.getElementById("searchInput").value.toLowerCase();
  const result = posts.filter(p => 
    p.title.toLowerCase().includes(term) || p.content.toLowerCase().includes(term)
  );
  renderPosts(result);
};

// Создать пост
function renderCreatePost() {
  currentPostTags = [];
  currentMedia = null;
  document.getElementById("pageContent").innerHTML = `
    <div class="create-post">
      <h2>Опубликовать свой пост / плагин</h2>
      <input type="text" id="postTitle" placeholder="Название">
      <textarea id="postContent" rows="6" placeholder="Описание..."></textarea>
      
      <h3>Теги</h3>
      <div id="selectedTags" style="margin:10px 0;"></div>
      <input type="text" id="tagInput" placeholder="Введите тег + Enter" onkeypress="if(event.key==='Enter') addTag()">
      
      <div class="upload-area" id="uploadArea">
        <p>Нажмите для загрузки изображения или видео</p>
        <input type="file" id="mediaInput" accept="image/*,video/*" style="display:none;">
      </div>
      
      <button onclick="publishPost()" class="btn btn-primary" style="width:100%;margin-top:20px;">Опубликовать</button>
    </div>
  `;

  document.getElementById("uploadArea").onclick = () => document.getElementById("mediaInput").click();
  document.getElementById("mediaInput").onchange = handleFileSelect;
}

function handleFileSelect(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    currentMedia = { url: ev.target.result, type: file.type.startsWith('video') ? 'video' : 'image' };
    document.getElementById("uploadArea").innerHTML = `<p>✅ Файл загружен: ${file.name}</p>`;
  };
  reader.readAsDataURL(file);
}

window.addTag = function() {
  const val = document.getElementById("tagInput").value.trim();
  if (val && !currentPostTags.includes(val)) {
    currentPostTags.push(val);
    document.getElementById("tagInput").value = '';
    renderSelectedTagsCreate();
  }
};

function renderSelectedTagsCreate() {
  document.getElementById("selectedTags").innerHTML = currentPostTags.map((tag,i) => 
    `<span class="tag" onclick="removeCreateTag(\( {i})"># \){tag} ×</span>`
  ).join('');
}

window.removeCreateTag = function(i) {
  currentPostTags.splice(i, 1);
  renderSelectedTagsCreate();
};

window.publishPost = function() {
  const title = document.getElementById("postTitle").value.trim();
  const content = document.getElementById("postContent").value.trim();
  if (!title) return alert("Введите заголовок!");

  posts.unshift({
    id: Date.now().toString(),
    title,
    content,
    media: currentMedia ? currentMedia.url : "",
    mediaType: currentMedia ? currentMedia.type : "",
    date: new Date().toLocaleDateString('ru-RU'),
    likes: 0,
    comments: [],
    tags: currentPostTags
  });

  saveData();
  alert("✅ Пост успешно опубликован!");
  document.querySelector('[data-page="home"]').click();
};

// Плагины
function renderPluginsPage() {
  document.getElementById("pageContent").innerHTML = `
    <h2>📦 Плагины и модули</h2>
    <div class="grid-cards" id="pluginsGrid"></div>
  `;
  const grid = document.getElementById("pluginsGrid");
  grid.innerHTML = posts.map(p => `
    <div class="card">
      <h3>${p.title}</h3>
      <div>\( {p.tags.map(t => `<span class="tag"># \){t}</span>`).join('')}</div>
      <p>${p.content}</p>
    </div>
  `).join('');
}

// Навигация
function initNavigation() {
  document.querySelectorAll('.nav-link').forEach(link => {
    link.addEventListener('click', () => {
      document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
      link.classList.add('active');
      
      const page = link.dataset.page;
      if (page === "home") renderHome();
      else if (page === "create") renderCreatePost();
      else if (page === "plugins") renderPluginsPage();
      else if (page === "channel") {
        document.getElementById("pageContent").innerHTML = `<h2>🔗 Мои ссылки</h2><p>Раздел в разработке</p>`;
      }
    });
  });
}

// Профиль
document.getElementById("openProfileBtn").addEventListener("click", () => {
  document.getElementById("profileName").textContent = currentUser.name;
  document.getElementById("profileBio").textContent = currentUser.bio;
  document.getElementById("profileModal").style.display = "flex";
});

window.closeProfileModal = () => {
  document.getElementById("profileModal").style.display = "none";
};

// Инициализация
loadData();
initNavigation();
renderHome();
</script>
</body>
</html>
